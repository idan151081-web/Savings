<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הבנק המשפחתי</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #f1f5f9; }
        .amount-text { font-style: italic; letter-spacing: -0.05em; text-align: left; direction: ltr; }
        #admin-panel, #main-content, #history-panel, #loading-screen { display: none; }
        #login-screen { display: flex; }
        .negative { color: #ef4444 !important; }
        input, select { text-align: center; direction: ltr; }
    </style>
</head>
<body class="min-h-screen">

    <div id="loading-screen" class="fixed inset-0 bg-blue-600 z-[3000] flex flex-col items-center justify-center text-white text-center p-6">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-white mb-4"></div>
        <p id="loading-msg" class="font-bold italic">מתחבר לכספת המאובטחת...</p>
    </div>

    <div id="login-screen" class="fixed inset-0 bg-blue-600 z-[2000] flex flex-col items-center justify-center p-6 text-white text-center">
        <h1 class="text-4xl font-black mb-2 italic">הבנק המשפחתי</h1>
        <p class="text-blue-200 mb-8 font-bold italic font-sm uppercase tracking-widest">Security First</p>
        <div class="w-full max-w-sm space-y-4">
            <input type="email" id="login-email" placeholder="אימייל" class="w-full p-4 rounded-2xl text-gray-800 font-bold outline-none shadow-lg border-none">
            <input type="password" id="login-pass" placeholder="סיסמה" class="w-full p-4 rounded-2xl text-gray-800 font-bold outline-none shadow-lg border-none">
            <button onclick="handleLogin()" id="login-btn" class="w-full bg-orange-400 p-4 rounded-2xl font-black text-xl shadow-xl active:scale-95 transition-transform italic">התחברות</button>
            <p id="login-error" class="text-red-300 text-sm font-bold hidden pt-2">פרטים לא נכונים</p>
        </div>
    </div>

    <div id="main-content">
        <button onclick="openAdmin()" class="fixed top-4 right-4 z-50 bg-slate-800 text-white text-[10px] px-4 py-2 rounded-full font-bold shadow-xl border border-slate-600">⚙️ ניהול</button>

        <div id="history-panel" class="fixed inset-0 bg-white z-[1500] p-6 overflow-y-auto">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h2 id="history-title" class="text-2xl font-bold text-blue-800 italic">פירוט תנועות</h2>
                <button onclick="closeHistory()" class="bg-gray-100 px-4 py-2 rounded-xl font-bold italic">סגור X</button>
            </div>
            <div id="history-list" class="divide-y divide-gray-100"></div>
        </div>

        <div id="admin-panel" class="fixed inset-0 bg-white z-[1000] p-6 overflow-y-auto">
            <div class="flex justify-between items-center mb-8 border-b pb-4">
                <h2 class="text-2xl font-bold text-blue-800 italic w-full text-right">לוח בקרה</h2>
                <button onclick="closeAdmin()" class="bg-gray-100 px-4 py-2 rounded-xl font-bold">X</button>
            </div>
            
            <div class="space-y-6 text-right">
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-2 uppercase italic">בחר חשבון לניהול</label>
                    <select id="child-selector" onchange="switchChild(this.value)" class="w-full p-4 border-2 border-blue-50 rounded-2xl bg-blue-50 font-black text-blue-800 text-right outline-none">
                        <option value="שגיא">שגיא</option>
                        <option value="איתי">איתי</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-2 uppercase italic">סוג פעולה</label>
                    <select id="admin-target" class="w-full p-4 border-2 border-gray-100 rounded-2xl bg-white font-bold text-right outline-none">
                        <option value="cash">💵 מזומן (עו"ש)</option>
                        <option value="savings">🏦 פיקדון (חיסכון)</option>
                        <option value="invest">📈 השקעה (S&P 500)</option>
                        <option value="config_interest">⚙️ עדכון % ריבית (חודשי)</option>
                    </select>
                </div>

                <input type="number" id="admin-amount" inputmode="decimal" class="w-full p-5 border-2 border-blue-100 rounded-2xl text-3xl font-black bg-blue-50 text-center" placeholder="0.00">
                
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="executeAction('plus')" class="bg-green-600 text-white p-6 rounded-2xl font-bold shadow-lg text-xl italic">➕ הפקדה</button>
                    <button id="withdraw-btn" onclick="executeAction('minus')" class="bg-red-600 text-white p-6 rounded-2xl font-bold shadow-lg text-xl italic">➖ משיכה</button>
                </div>

                <div class="pt-10 flex flex-col items-center gap-4">
                    <button onclick="firebase.auth().signOut()" class="text-blue-600 font-bold underline">התנתק מהמערכת</button>
                    <p class="text-[10px] text-gray-300 italic">Family Bank v2.1 | Secure Session</p>
                </div>
            </div>
        </div>

        <header class="bg-blue-600 text-white pt-12 pb-10 px-8 rounded-b-[3rem] shadow-xl mb-8 text-center relative overflow-hidden">
            <div class="relative z-10">
                <h1 id="main-title" class="text-3xl font-extrabold italic tracking-tight uppercase">הבנק של שגיא</h1>
                <div class="text-blue-200 text-[10px] mt-2 italic opacity-70 uppercase tracking-widest font-bold">Safe & Secure Savings</div>
            </div>
            <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-blue-500 rounded-full opacity-20"></div>
        </header>

        <main class="px-6 space-y-6 max-w-md mx-auto pb-24">
            <div class="bg-white p-6 rounded-3xl shadow-sm border-r-8 border-orange-400">
                <div class="flex justify-between items-center mb-4">
                    <button onclick="showHistory('cash')" class="text-[10px] bg-orange-50 text-orange-600 px-3 py-1 rounded-full font-bold italic border border-orange-100">פירוט ←</button>
                    <h3 class="text-gray-400 text-[10px] font-bold uppercase italic tracking-tighter">Cash Account / עו"ש</h3>
                </div>
                <p id="cash-display" class="text-4xl font-black text-gray-800 amount-text">₪0</p>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-sm border-r-8 border-green-500">
                <div class="flex justify-between items-start mb-1 text-right italic">
                    <button onclick="showHistory('savings')" class="text-[10px] bg-green-50 text-green-700 px-3 py-1 rounded-full font-bold italic border border-green-100">פירוט ←</button>
                    <h3 class="text-gray-400 text-[10px] font-bold uppercase italic tracking-tighter">Savings Account / פיקדון</h3>
                </div>
                <div id="interest-tag" class="text-[10px] text-green-600 font-bold mb-2 italic">0.5% ריבית חודשית</div>
                <p id="savings-display" class="text-4xl font-black text-gray-800 amount-text">₪0</p>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-sm border-r-8 border-indigo-600">
                <div class="flex justify-between items-center mb-2">
                     <button onclick="showHistory('invest')" class="text-[10px] bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full font-bold italic border border-indigo-100">פירוט ←</button>
                     <h3 class="text-gray-400 text-[10px] font-bold uppercase italic tracking-tighter">Market Index / S&P 500</h3>
                </div>
                <p id="invest-display" class="text-4xl font-black text-gray-800 amount-text mb-4">₪0</p>
                <div class="flex justify-between text-[10px] text-gray-400 border-t pt-3 border-dashed italic">
                    <span id="market-status" class="font-bold">טוען מדד...</span>
                    <span>קרן: <span class="font-bold">₪</span><span id="invest-base" class="font-bold">0</span></span>
                </div>
            </div>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCdW8ww3e7lQvDI3e0hO8Yn3YvHbtJSf4g",
            authDomain: "familybank-f6585.firebaseapp.com",
            databaseURL: "https://familybank-f6585-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "familybank-f6585",
            storageBucket: "familybank-f6585.firebasestorage.app",
            messagingSenderId: "398823332492",
            appId: "1:398823332492:web:a1a167f0288cf71c4a79a9"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const dbRoot = firebase.database().ref('users');
        
        let currentChild = localStorage.getItem('lastChild') || 'שגיא';
        let dbRef = dbRoot.child(currentChild);
        let globalData = null;
        let marketPrice = 0;

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('loading-screen').style.display = 'flex';
                startApp();
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('main-content').style.display = 'none';
                document.getElementById('loading-screen').style.display = 'none';
            }
        });

        function handleLogin() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            auth.signInWithEmailAndPassword(email, pass).catch(() => {
                document.getElementById('login-error').classList.remove('hidden');
            });
        }

        async function fetchMarket() {
            try {
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/%5EGSPC')}`);
                const j = await res.json();
                const price = JSON.parse(j.contents).chart.result[0].meta.regularMarketPrice;
                if (price > 0) {
                    marketPrice = price;
                    document.getElementById('market-status').innerText = "מדד: " + Math.round(marketPrice);
                    return true;
                }
                return false;
            } catch(e) { 
                document.getElementById('market-status').innerText = "שגיאה בטעינת מדד";
                return false; 
            }
        }

        async function startApp() {
            // קודם כל ננסה להביא את שער המדד
            if (!marketPrice) await fetchMarket();
            
            document.getElementById('main-title').innerText = "הבנק של " + currentChild;
            document.getElementById('child-selector').value = currentChild;

            dbRef.on('value', (s) => {
                globalData = s.val() || {};
                
                // הסרת מסך טעינה רק כשיש נתונים וגם שער מדד
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';

                const interest = globalData.config_interest !== undefined ? (globalData.config_interest / 100) : 0.005;
                document.getElementById('interest-tag').innerText = (interest * 100).toFixed(1) + '% ריבית חודשית';

                // חישוב עו"ש
                let cashTotal = 0;
                if (globalData.cash_log) Object.values(globalData.cash_log).forEach(t => cashTotal += t.amount);
                document.getElementById('cash-display').innerText = '₪' + cashTotal.toLocaleString();

                // חישוב פיקדון (ריבית דריבית יומית)
                let savingsTotal = 0;
                const now = new Date().getTime();
                if (globalData.savings_log) {
                    Object.values(globalData.savings_log).forEach(t => {
                        const daysPast = (now - t.date) / (1000 * 60 * 60 * 24);
                        const dailyRate = Math.pow(1 + interest, 1/30);
                        savingsTotal += t.amount * Math.pow(dailyRate, daysPast);
                    });
                }
                document.getElementById('savings-display').innerText = '₪' + Math.round(savingsTotal).toLocaleString();

                // חישוב השקעות - פתרון הבאג:
                let totalUnits = 0, totalInvested = 0;
                if (globalData.invest_log) {
                    Object.values(globalData.invest_log).forEach(t => {
                        totalUnits += t.units;
                        totalInvested += t.amount;
                    });
                }
                
                // אם המדד עדיין 0 (תקלת תקשורת), נציג "טוען..." במקום 0 ש"ח מבלבל
                if (marketPrice > 0) {
                    document.getElementById('invest-display').innerText = '₪' + Math.round(totalUnits * marketPrice).toLocaleString();
                } else {
                    document.getElementById('invest-display').innerText = 'טוען שער...';
                }
                document.getElementById('invest-base').innerText = totalInvested.toLocaleString();
            });
        }

        function switchChild(name) {
            currentChild = name;
            localStorage.setItem('lastChild', name);
            dbRef.off(); // סגירת המאזין הישן
            dbRef = dbRoot.child(name);
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('loading-screen').style.display = 'flex';
            startApp();
            closeAdmin();
        }

        function showHistory(type) {
            const list = document.getElementById('history-list');
            list.innerHTML = "";
            document.getElementById('history-panel').style.display = 'block';
            if (!globalData || !globalData[type + '_log']) {
                list.innerHTML = "<p class='text-center py-10 text-gray-400 italic font-bold'>אין עדיין תנועות בחשבון</p>";
                return;
            }
            
            Object.values(globalData[type + '_log']).sort((a,b) => b.date - a.date).forEach(t => {
                const row = document.createElement('div');
                row.className = "flex justify-between p-5 italic font-bold items-center";
                const color = t.amount < 0 ? 'text-red-500' : 'text-green-600';
                row.innerHTML = `<span class="${color} font-mono tracking-tighter">₪${t.amount.toLocaleString()}</span>
                                <span class="text-gray-400 text-xs font-normal">${new Date(t.date).toLocaleDateString('he-IL')}</span>`;
                list.appendChild(row);
            });
        }

        function closeHistory() { document.getElementById('history-panel').style.display = 'none'; }
        function openAdmin() { if(prompt("סיסמת מנהל:") === "1234") document.getElementById('admin-panel').style.display='block'; }
        function closeAdmin() { document.getElementById('admin-panel').style.display='none'; }

        async function executeAction(type) {
            const target = document.getElementById('admin-target').value;
            let val = parseFloat(document.getElementById('admin-amount').value);
            if(isNaN(val) || val === 0) return;
            const now = new Date().getTime();

            if (target === 'config_interest') {
                dbRef.child('config_interest').set(val);
            } else if (target === 'invest') {
                if (type === 'minus') val = -Math.abs(val);
                // הגנה: אי אפשר לקנות יחידות אם המדד לא נטען
                if (!marketPrice) {
                    const success = await fetchMarket();
                    if (!success) return alert("לא ניתן לבצע פעולה - שער מדד לא זמין");
                }
                const units = val / marketPrice;
                dbRef.child('invest_log').push({ amount: val, units, date: now });
            } else {
                if (type === 'minus') val = -Math.abs(val);
                dbRef.child(target + '_log').push({ amount: val, date: now });
            }
            document.getElementById('admin-amount').value = "";
            closeAdmin();
        }
    </script>
</body>
</html>
