<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הבנק של שגיא</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #f1f5f9; }
        .amount-text { font-style: italic; letter-spacing: -0.05em; text-align: left; direction: ltr; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <header class="bg-gradient-to-b from-blue-600 to-blue-700 text-white p-8 rounded-b-[3rem] shadow-xl mb-8 text-center">
        <h1 class="text-3xl font-extrabold tracking-tight">הבנק של שגיא</h1>
        <div id="status-msg" class="text-blue-100 text-[10px] mt-2 opacity-80 italic">מתחבר למערכת...</div>
    </header>

    <main class="px-6 space-y-6 max-w-md mx-auto">
        
        <div class="bg-white p-6 rounded-3xl shadow-md border-r-8 border-orange-400 flex justify-between items-center">
            <div class="bg-orange-50 p-3 rounded-2xl text-2xl">💵</div>
            <div class="text-left">
                <h3 class="text-gray-400 text-[10px] font-bold uppercase mb-1">עו"ש (מזומן)</h3>
                <p class="text-4xl font-black text-gray-800 amount-text">₪<span id="cash-display">--</span></p>
            </div>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-md border-r-8 border-green-500 flex justify-between items-center">
            <div class="text-left w-full">
                <div class="flex justify-between items-start mb-1">
                    <span id="interest-tag" class="bg-green-100 text-green-700 text-[10px] px-2 py-0.5 rounded-full font-bold italic">--% ריבית</span>
                    <h3 class="text-gray-400 text-[10px] font-bold uppercase">פיקדון בריבית</h3>
                </div>
                <p class="text-4xl font-black text-gray-800 amount-text">₪<span id="savings-display">--</span></p>
            </div>
        </div>

        <div id="invest-card" class="bg-white p-6 rounded-3xl shadow-md border-r-8 border-indigo-600">
            <div class="flex justify-between items-start mb-1">
                 <div id="stock-trend" class="text-[10px] font-bold px-2 py-0.5 rounded-full bg-gray-100 text-gray-500 italic">טוען...</div>
                 <h3 class="text-gray-400 text-[10px] font-bold uppercase">מסלול מדד (S&P 500)</h3>
            </div>
            <p class="text-4xl font-black text-gray-800 amount-text mb-4 text-left">₪<span id="invest-display">--</span></p>
            
            <div class="flex justify-between items-center text-[10px] text-gray-400 border-t pt-3 border-dashed">
                <span id="market-status" class="italic italic">מנסה להתעדכן מהבורסה...</span>
                <span>השקעה: ₪<span id="invest-base">0</span></span>
            </div>
        </div>

    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCdW8ww3e7lQvDI3e0hO8Yn3YvHbtJSf4g",
            authDomain: "familybank-f6585.firebaseapp.com",
            databaseURL: "https://familybank-f6585-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "familybank-f6585",
            storageBucket: "familybank-f6585.firebasestorage.app",
            messagingSenderId: "398823332492",
            appId: "1:398823332492:web:a1a167f0288cf71c4a79a9",
            measurementId: "G-YZD85S2B6V"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const childRef = database.ref('users/שגיא');

        async function getMarketPrice() {
            try {
                const url = `https://query1.finance.yahoo.com/v8/finance/chart/%5EGSPC`;
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
                const response = await fetch(proxyUrl);
                const json = await response.json();
                const data = JSON.parse(json.contents);
                return data.chart.result[0].meta.regularMarketPrice;
            } catch (e) { return null; }
        }

        childRef.on('value', async (snapshot) => {
            const val = snapshot.val();
            if (!val) return;

            document.getElementById('status-msg').innerText = "מעודכן ל-" + new Date().toLocaleTimeString();

            // עדכון מזומן וחיסכון
            document.getElementById('cash-display').innerText = (val.Cash || 0).toLocaleString();
            document.getElementById('savings-display').innerText = (val.Savings || 0).toLocaleString();
            document.getElementById('interest-tag').innerText = (val.Interest_ratr || 0) + '% ריבית חודשית';
            
            // השקעות - תצוגה בסיסית
            const baseInvest = val.Investments || 0;
            const investBasePrice = val.Investments_Base || 5000;
            document.getElementById('invest-display').innerText = baseInvest.toLocaleString();
            document.getElementById('invest-base').innerText = baseInvest.toLocaleString();

            // עדכון בורסה
            const currentMarket = await getMarketPrice();
            if (currentMarket) {
                const ratio = currentMarket / investBasePrice;
                const calculatedValue = Math.round(baseInvest * ratio);
                const diff = (((currentMarket - investBasePrice) / investBasePrice) * 100).toFixed(2);
                
                document.getElementById('invest-display').innerText = calculatedValue.toLocaleString();
                const trend = document.getElementById('stock-trend');
                trend.innerText = (diff > 0 ? '+' : '') + diff + '%';
                trend.className = diff > 0 ? 
                    "text-[10px] font-bold px-2 py-0.5 rounded-full bg-green-100 text-green-700 italic" : 
                    "text-[10px] font-bold px-2 py-0.5 rounded-full bg-red-100 text-red-700 italic";
                
                document.getElementById('market-status').innerText = "מדד: " + Math.round(currentMarket);
            } else {
                document.getElementById('market-status').innerText = "בורסה סגורה / אין חיבור";
            }
        });
    </script>
</body>
</html>
