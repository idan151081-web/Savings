<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הבנק של שגיא</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #f1f5f9; }
        .amount-text { font-style: italic; letter-spacing: -0.05em; text-align: left; direction: ltr; }
        #admin-panel { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.98); z-index: 50; padding: 2rem; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <div id="admin-panel" class="overflow-y-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-blue-800">ניהול חשבון</h2>
            <button onclick="closeAdmin()" class="bg-gray-200 p-2 rounded-full text-sm">❌ סגור</button>
        </div>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-gray-700">בחר סוג חשבון:</label>
                <select id="admin-target" class="w-full p-3 border rounded-xl bg-white shadow-sm">
                    <option value="Cash">עו"ש (מזומן)</option>
                    <option value="Savings">פיקדון בריבית</option>
                    <option value="Interest_ratr">אחוז ריבית חודשית</option>
                    <option value="Investments">השקעה במדד (קרן)</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700">סכום / ערך חדש:</label>
                <input type="number" id="admin-amount" class="w-full p-3 border rounded-xl shadow-sm" placeholder="הכנס מספר...">
            </div>
            <button onclick="updateData('add')" class="w-full bg-green-600 text-white p-4 rounded-xl font-bold text-lg shadow-lg">➕ הפקד / הוסף</button>
            <button onclick="updateData('set')" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold text-lg shadow-lg">📝 קבע ערך חדש</button>
        </div>
        <p class="text-[10px] text-gray-400 mt-10 text-center italic">"הוסף" מוסיף לקיים | "קבע" מחליף את הקיים</p>
    </div>

    <header class="bg-gradient-to-b from-blue-600 to-blue-700 text-white p-8 rounded-b-[3rem] shadow-xl mb-8 text-center" onmousedown="startTimer()" onmouseup="clearTimer()" ontouchstart="startTimer()" ontouchend="clearTimer()">
        <h1 class="text-3xl font-extrabold tracking-tight">הבנק של שגיא</h1>
        <div id="status-msg" class="text-blue-100 text-[10px] mt-2 opacity-80 italic italic">מחובר למערכת...</div>
    </header>

    <main class="px-6 space-y-6 max-w-md mx-auto">
        <div class="bg-white p-6 rounded-3xl shadow-md border-r-8 border-orange-400 flex justify-between items-center">
            <div class="bg-orange-50 p-3 rounded-2xl text-2xl">💵</div>
            <div class="text-left">
                <h3 class="text-gray-400 text-[10px] font-bold uppercase mb-1">עו"ש (מזומן)</h3>
                <p class="text-4xl font-black text-gray-800 amount-text">₪<span id="cash-display">--</span></p>
            </div>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-md border-r-8 border-green-500 flex justify-between items-center">
            <div class="text-left w-full">
                <div class="flex justify-between items-start mb-1">
                    <span id="interest-tag" class="bg-green-100 text-green-700 text-[10px] px-2 py-0.5 rounded-full font-bold italic">--% ריבית</span>
                    <h3 class="text-gray-400 text-[10px] font-bold uppercase">פיקדון בריבית</h3>
                </div>
                <p class="text-4xl font-black text-gray-800 amount-text">₪<span id="savings-display">--</span></p>
            </div>
        </div>

        <div id="invest-card" class="bg-white p-6 rounded-3xl shadow-md border-r-8 border-indigo-600">
            <div class="flex justify-between items-start mb-1">
                 <div id="stock-trend" class="text-[10px] font-bold px-2 py-0.5 rounded-full bg-gray-100 text-gray-500 italic italic">טוען...</div>
                 <h3 class="text-gray-400 text-[10px] font-bold uppercase">מסלול מדד (S&P 500)</h3>
            </div>
            <p class="text-4xl font-black text-gray-800 amount-text mb-4 text-left">₪<span id="invest-display">--</span></p>
            <div class="flex justify-between items-center text-[10px] text-gray-400 border-t pt-3 border-dashed">
                <span id="market-status" class="italic">מעדכן בורסה...</span>
                <span>השקעה: ₪<span id="invest-base">0</span></span>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCdW8ww3e7lQvDI3e0hO8Yn3YvHbtJSf4g",
            authDomain: "familybank-f6585.firebaseapp.com",
            databaseURL: "https://familybank-f6585-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "familybank-f6585",
            storageBucket: "familybank-f6585.firebasestorage.app",
            messagingSenderId: "398823332492",
            appId: "1:398823332492:web:a1a167f0288cf71c4a79a9",
            measurementId: "G-YZD85S2B6V"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const childRef = database.ref('users/שגיא');
        let currentData = {};

        // משיכת נתונים
        childRef.on('value', async (snapshot) => {
            currentData = snapshot.val();
            if (!currentData) return;
            document.getElementById('cash-display').innerText = (currentData.Cash || 0).toLocaleString();
            document.getElementById('savings-display').innerText = (currentData.Savings || 0).toLocaleString();
            document.getElementById('interest-tag').innerText = (currentData.Interest_ratr || 0) + '% ריבית חודשית';
            document.getElementById('invest-base').innerText = (currentData.Investments || 0).toLocaleString();
            updateMarket(currentData.Investments, currentData.Investments_Base);
        });

        // חישוב בורסה
        async function updateMarket(amount, base) {
            try {
                const url = `https://query1.finance.yahoo.com/v8/finance/chart/%5EGSPC`;
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
                const response = await fetch(proxyUrl);
                const json = await response.json();
                const marketPrice = JSON.parse(json.contents).chart.result[0].meta.regularMarketPrice;
                
                const calculated = Math.round(amount * (marketPrice / (base || 5000)));
                const diff = (((marketPrice - base) / base) * 100).toFixed(2);
                document.getElementById('invest-display').innerText = calculated.toLocaleString();
                document.getElementById('stock-trend').innerText = (diff > 0 ? '+' : '') + diff + '%';
                document.getElementById('market-status').innerText = "מדד: " + Math.round(marketPrice);
            } catch (e) { 
                document.getElementById('invest-display').innerText = amount.toLocaleString();
                document.getElementById('market-status').innerText = "אין חיבור לבורסה";
            }
        }

        // ניהול הורה
        let pressTimer;
        function startTimer() { pressTimer = window.setTimeout(openAdmin, 3000); }
        function clearTimer() { clearTimeout(pressTimer); }
        
        function openAdmin() {
            const pass = prompt("הכנס קוד סודי לניהול:");
            if (pass === "1234") { document.getElementById('admin-panel').style.display = 'block'; }
            else { alert("קוד שגוי"); }
        }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

        function updateData(mode) {
            const field = document.getElementById('admin-target').value;
            const amount = parseFloat(document.getElementById('admin-amount').value);
            if (isNaN(amount)) return alert("הכנס מספר תקין");

            let newValue = amount;
            if (mode === 'add') {
                newValue = (currentData[field] || 0) + amount;
            }

            childRef.child(field).set(newValue).then(() => {
                alert("עודכן בהצלחה!");
                document.getElementById('admin-amount').value = "";
                closeAdmin();
            });
        }
    </script>
</body>
</html>
