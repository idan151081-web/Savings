<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הבנק המשפחתי v2.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #f1f5f9; }
        .amount-text { font-style: italic; letter-spacing: -0.05em; text-align: left; direction: ltr; }
        #admin-panel, #main-content, #history-panel, #loading-screen { display: none; }
        #login-screen { display: flex; }
        input, select { text-align: center; direction: ltr; }
    </style>
</head>
<body class="min-h-screen text-right">

    <div id="loading-screen" class="fixed inset-0 bg-blue-600 z-[3000] flex flex-col items-center justify-center text-white">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-white mb-4"></div>
        <p class="font-bold italic">טוען נתונים ושערי מניות...</p>
    </div>

    <div id="login-screen" class="fixed inset-0 bg-blue-600 z-[2000] flex flex-col items-center justify-center p-6 text-white text-center">
        <h1 class="text-4xl font-black mb-8 italic">הבנק המשפחתי</h1>
        <div class="w-full max-w-sm space-y-4">
            <input type="email" id="login-email" placeholder="אימייל" class="w-full p-4 rounded-2xl text-gray-800 font-bold outline-none border-none">
            <input type="password" id="login-pass" placeholder="סיסמה" class="w-full p-4 rounded-2xl text-gray-800 font-bold outline-none border-none">
            <button onclick="handleLogin()" class="w-full bg-orange-400 p-4 rounded-2xl font-black text-xl shadow-xl italic">כניסה</button>
        </div>
    </div>

    <div id="main-content">
        <button onclick="openAdmin()" class="fixed top-4 right-4 z-50 bg-slate-800 text-white text-[10px] px-4 py-2 rounded-full font-bold shadow-xl border border-slate-600">⚙️ ניהול</button>

        <div id="history-panel" class="fixed inset-0 bg-white z-[1500] p-6 overflow-y-auto text-right">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h2 id="history-title" class="text-2xl font-bold text-blue-800 italic">פירוט תנועות</h2>
                <button onclick="closeHistory()" class="bg-gray-100 px-4 py-2 rounded-xl font-bold italic">סגור X</button>
            </div>
            <div id="history-list" class="space-y-3"></div>
        </div>

        <div id="admin-panel" class="fixed inset-0 bg-white z-[1000] p-6 overflow-y-auto text-right">
            <div class="flex justify-between items-center mb-8 border-b pb-4">
                <h2 class="text-2xl font-bold text-blue-800 italic w-full">ניהול כספים</h2>
                <button onclick="closeAdmin()" class="bg-gray-100 px-4 py-2 rounded-xl font-bold italic">X</button>
            </div>
            <div class="space-y-6">
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">חשבון יעד</label>
                    <select id="child-selector" onchange="switchChild(this.value)" class="w-full p-4 border-2 border-blue-50 rounded-2xl bg-blue-50 font-black text-blue-800 outline-none">
                        <option value="שגיא">שגיא</option>
                        <option value="איתי">איתי</option>
                    </select>
                </div>
                <select id="admin-target" class="w-full p-4 border-2 border-gray-100 rounded-2xl bg-white font-bold outline-none">
                    <option value="cash">💵 עו"ש</option>
                    <option value="savings">🏦 פיקדון (+ריבית)</option>
                    <option value="invest">📈 S&P 500</option>
                    <option value="config_interest">⚙️ עדכון % ריבית פיקדון</option>
                </select>
                <input type="number" id="admin-amount" inputmode="decimal" class="w-full p-5 border-2 border-blue-100 rounded-2xl text-3xl font-black bg-blue-50" placeholder="סכום ₪">
                <input type="text" id="admin-note" class="w-full p-4 border-2 border-gray-50 rounded-2xl bg-gray-50 text-right font-bold" placeholder="הערה (למשל: דמי כיס)">
                
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="executeAction('plus')" class="bg-green-600 text-white p-6 rounded-2xl font-bold shadow-lg italic">➕ הפקדה</button>
                    <button onclick="executeAction('minus')" class="bg-red-600 text-white p-6 rounded-2xl font-bold shadow-lg italic">➖ משיכה</button>
                </div>
                <div class="pt-8 text-center">
                    <button onclick="firebase.auth().signOut()" class="text-blue-600 font-bold underline italic text-sm">התנתקות</button>
                </div>
            </div>
        </div>

        <header class="bg-blue-600 text-white pt-12 pb-10 px-8 rounded-b-[3rem] shadow-xl mb-8 text-center relative overflow-hidden">
            <h1 id="main-title" class="text-3xl font-extrabold italic tracking-tight uppercase relative z-10">הבנק של שגיא</h1>
        </header>

        <main class="px-6 space-y-6 max-w-md mx-auto pb-24 text-right">
            <div class="bg-white p-6 rounded-3xl shadow-sm border-r-8 border-orange-400">
                <div class="flex justify-between items-center mb-4">
                    <button onclick="showHistory('cash')" class="text-[10px] bg-orange-50 text-orange-600 px-3 py-1 rounded-full font-bold italic border border-orange-100">פירוט ←</button>
                    <h3 class="text-gray-400 text-[10px] font-bold uppercase italic tracking-widest">CASH / עו"ש</h3>
                </div>
                <p id="cash-display" class="text-4xl font-black text-gray-800 amount-text">₪0</p>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-sm border-r-8 border-green-500">
                <div class="flex justify-between items-start mb-1 italic">
                    <button onclick="showHistory('savings')" class="text-[10px] bg-green-50 text-green-700 px-3 py-1 rounded-full font-bold italic border border-green-100">פירוט ←</button>
                    <h3 class="text-gray-400 text-[10px] font-bold uppercase italic tracking-widest">SAVINGS / פיקדון</h3>
                </div>
                <div id="interest-tag" class="text-[10px] text-green-600 font-bold mb-2 italic">0.5% ריבית</div>
                <p id="savings-display" class="text-4xl font-black text-gray-800 amount-text">₪0.00</p>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-sm border-r-8 border-indigo-600">
                <div class="flex justify-between items-center mb-2">
                     <button onclick="showHistory('invest')" class="text-[10px] bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full font-bold italic border border-indigo-100">פירוט ←</button>
                     <h3 class="text-gray-400 text-[10px] font-bold uppercase italic tracking-widest">S&P 500 INDEX</h3>
                </div>
                <p id="invest-display" class="text-4xl font-black text-gray-800 amount-text mb-4">₪0</p>
                <div class="flex flex-col gap-1 text-[10px] text-gray-400 border-t pt-3 border-dashed italic font-bold">
                    <div class="flex justify-between">
                        <span id="market-status">שער נוכחי: ...</span>
                        <span>תשואה: <span id="stock-yield">0%</span></span>
                    </div>
                    <div class="flex justify-between border-t border-gray-50 pt-1 mt-1 opacity-70 uppercase">
                        <span>שער קנייה אחרון: <span id="last-buy-price">0</span></span>
                        <span>קרן: ₪<span id="invest-base">0</span></span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCdW8ww3e7lQvDI3e0hO8Yn3YvHbtJSf4g",
            authDomain: "familybank-f6585.firebaseapp.com",
            databaseURL: "https://familybank-f6585-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "familybank-f6585",
            storageBucket: "familybank-f6585.firebasestorage.app",
            messagingSenderId: "398823332492",
            appId: "1:398823332492:web:a1a167f0288cf71c4a79a9"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const dbRoot = firebase.database().ref('users');
        
        let currentChild = localStorage.getItem('lastChild') || 'שגיא';
        let dbRef = dbRoot.child(currentChild);
        let globalData = null;
        let marketPrice = 6582; 

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('loading-screen').style.display = 'flex';
                startApp();
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('main-content').style.display = 'none';
            }
        });

        function handleLogin() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            auth.signInWithEmailAndPassword(email, pass).catch(() => alert("פרטים שגויים"));
        }

        async function fetchMarket() {
            try {
                const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/%5EGSPC')}`);
                const data = await res.json();
                const price = data.chart.result[0].meta.regularMarketPrice;
                if (price > 1000) {
                    marketPrice = price;
                    document.getElementById('market-status').innerText = "שער נוכחי: " + Math.round(marketPrice);
                }
            } catch(e) { console.warn("Using default price"); }
        }

        async function startApp() {
            await fetchMarket();
            document.getElementById('main-title').innerText = "הבנק של " + currentChild;
            document.getElementById('child-selector').value = currentChild;

            dbRef.on('value', (s) => {
                globalData = s.val() || {};
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';

                const interest = globalData.config_interest !== undefined ? (globalData.config_interest / 100) : 0.005;
                document.getElementById('interest-tag').innerText = (interest * 100).toFixed(1) + '% ריבית חודשית';

                // עו"ש
                let cashTotal = 0;
                if (globalData.cash_log) Object.values(globalData.cash_log).forEach(t => cashTotal += t.amount);
                document.getElementById('cash-display').innerText = '₪' + Math.round(cashTotal).toLocaleString();

                // פיקדון (דיוק באגורות)
                let savingsTotal = 0;
                const now = new Date().getTime();
                if (globalData.savings_log) {
                    Object.values(globalData.savings_log).forEach(t => {
                        const daysPast = (now - t.date) / (1000 * 60 * 60 * 24);
                        const dailyRate = Math.pow(1 + interest, 1/30);
                        savingsTotal += t.amount * Math.pow(dailyRate, daysPast);
                    });
                }
                document.getElementById('savings-display').innerText = '₪' + savingsTotal.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});

                // S&P 500
                let totalUnits = 0, totalInvested = 0, lastPrice = 0;
                if (globalData.invest_log) {
                    const logs = Object.values(globalData.invest_log);
                    logs.forEach(t => {
                        totalUnits += t.units;
                        totalInvested += t.amount;
                        if (t.amount > 0) lastPrice = t.price_at_buy; // השער האחרון בו בוצעה קנייה
                    });
                }
                
                const currentVal = Math.round(totalUnits * marketPrice);
                const yieldPct = totalInvested > 0 ? (((currentVal - totalInvested) / totalInvested) * 100).toFixed(1) : 0;
                
                document.getElementById('invest-display').innerText = '₪' + currentVal.toLocaleString();
                document.getElementById('invest-base').innerText = Math.round(totalInvested).toLocaleString();
                document.getElementById('last-buy-price').innerText = lastPrice ? Math.round(lastPrice).toLocaleString() : "---";
                const yieldEl = document.getElementById('stock-yield');
                yieldEl.innerText = (yieldPct >= 0 ? '+' : '') + yieldPct + '%';
                yieldEl.className = yieldPct >= 0 ? "text-green-600" : "text-red-500";
            });
        }

        function executeAction(type) {
            const target = document.getElementById('admin-target').value;
            let val = parseFloat(document.getElementById('admin-amount').value);
            const note = document.getElementById('admin-note').value || "";
            if(isNaN(val) || val === 0) return;
            const now = new Date().getTime();

            if (type === 'minus') val = -Math.abs(val);

            if (target === 'config_interest') {
                dbRef.child('config_interest').set(val);
            } else if (target === 'invest') {
                const units = val / marketPrice;
                dbRef.child('invest_log').push({ 
                    amount: val, 
                    units: units, 
                    date: now, 
                    note: note, 
                    price_at_buy: marketPrice 
                });
            } else {
                dbRef.child(target + '_log').push({ amount: val, date: now, note: note });
            }
            
            document.getElementById('admin-amount').value = "";
            document.getElementById('admin-note').value = "";
            closeAdmin();
        }

        function showHistory(type) {
            const list = document.getElementById('history-list');
            list.innerHTML = "";
            document.getElementById('history-panel').style.display = 'block';
            if (!globalData || !globalData[type + '_log']) {
                list.innerHTML = "<p class='text-center py-10 text-gray-400 italic'>אין תנועות</p>";
                return;
            }
            Object.values(globalData[type + '_log']).sort((a,b) => b.date - a.date).forEach(t => {
                const row = document.createElement('div');
                row.className = "p-4 bg-gray-50 rounded-2xl border-b border-gray-100 italic";
                const color = t.amount < 0 ? 'text-red-500' : 'text-green-600';
                row.innerHTML = `
                    <div class="flex justify-between items-center mb-1">
                        <span class="${color} font-black">₪${t.amount.toLocaleString()}</span>
                        <span class="text-[10px] text-gray-400">${new Date(t.date).toLocaleDateString('he-IL')}</span>
                    </div>
                    <div class="text-xs text-gray-600 font-bold">${t.note || '---'}</div>
                `;
                list.appendChild(row);
            });
        }

        function switchChild(name) {
            currentChild = name;
            localStorage.setItem('lastChild', name);
            dbRef.off();
            dbRef = dbRoot.child(name);
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('loading-screen').style.display = 'flex';
            startApp();
            closeAdmin();
        }

        function closeHistory() { document.getElementById('history-panel').style.display = 'none'; }
        function openAdmin() { if(prompt("סיסמה:") === "1234") document.getElementById('admin-panel').style.display='block'; }
        function closeAdmin() { document.getElementById('admin-panel').style.display='none'; }
    </script>
</body>
</html>
