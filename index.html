<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הבנק של שגיא</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-10 text-right">

    <header class="bg-blue-600 text-white p-8 rounded-b-[3rem] shadow-lg mb-8 text-center">
        <h1 class="text-3xl font-extrabold">הבנק של שגיא</h1>
        <div id="status-msg" class="text-blue-200 text-[10px] mt-2 font-mono italic">מנסה להתחבר...</div>
    </header>

    <main class="px-6 space-y-6 max-w-md mx-auto">
        
        <div class="bg-white p-6 rounded-3xl shadow-sm border-r-8 border-orange-400 flex justify-between items-center">
            <div>
                <h3 class="text-gray-400 text-xs font-bold uppercase text-right">עו"ש (מזומן)</h3>
                <p id="cash-display" class="text-4xl font-black text-gray-800 text-right italic">₪--</p>
            </div>
            <div class="text-2xl">💵</div>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-sm border-r-8 border-green-500">
            <h3 class="text-gray-400 text-xs font-bold uppercase text-right">פיקדון בריבית</h3>
            <p id="savings-display" class="text-4xl font-black text-gray-800 text-right italic">₪--</p>
            <div class="mt-2 text-green-700 text-[10px] font-bold italic" id="interest-tag">0% ריבית</div>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-sm border-r-8 border-indigo-600">
            <h3 class="text-gray-400 text-xs font-bold uppercase text-right italic">מסלול מדד (S&P 500)</h3>
            <p id="invest-display" class="text-4xl font-black text-gray-800 text-right italic">₪--</p>
            <div class="mt-3 text-[11px] text-gray-400 border-t pt-2 border-dashed flex justify-between">
                <span>קרן: <span id="invest-base">₪0</span></span>
                <span id="market-status">בודק בורסה...</span>
            </div>
        </div>

    </main>

    <script>
        // וידוא שהקונפיגורציה מדויקת לפי מה ששלחת
        const firebaseConfig = {
            apiKey: "AIzaSyCdW8ww3e7lQvDI3e0hO8Yn3YvHbtJSf4g",
            authDomain: "familybank-f6585.firebaseapp.com",
            databaseURL: "https://familybank-f6585-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "familybank-f6585",
            storageBucket: "familybank-f6585.firebasestorage.app",
            messagingSenderId: "398823332492",
            appId: "1:398823332492:web:a1a167f0288cf71c4a79a9",
            measurementId: "G-YZD85S2B6V"
        };

        // אתחול
        try {
            firebase.initializeApp(firebaseConfig);
            const database = firebase.database();
            
            // שימוש בנתיב הישיר לנתונים
            const childRef = database.ref('users/שגיא');

            childRef.on('value', (snapshot) => {
                const val = snapshot.val();
                console.log("נתונים שהתקבלו:", val);

                if (val) {
                    document.getElementById('status-msg').innerText = "מחובר ומסונכרן";
                    
                    // עדכון שדות פשוטים
                    document.getElementById('cash-display').innerText = '₪' + (val.Cash || 0);
                    document.getElementById('savings-display').innerText = '₪' + (val.Savings || 0);
                    document.getElementById('interest-tag').innerText = (val.Interest_ratr || 0) + '% ריבית חודשית';
                    
                    // השקעות - קודם כל נציג מה שיש ב-Firebase
                    const invValue = val.Investments || 0;
                    document.getElementById('invest-display').innerText = '₪' + invValue;
                    document.getElementById('invest-base').innerText = '₪' + invValue;
                } else {
                    document.getElementById('status-msg').innerText = "שגיאה: לא נמצאו נתונים לשם 'שגיא'";
                }
            }, (error) => {
                document.getElementById('status-msg').innerText = "שגיאה ב-Firebase: " + error.message;
            });

        } catch (e) {
            document.getElementById('status-msg').innerText = "קריסה באתחול: " + e.message;
        }
    </script>
</body>
</html>
