<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הבנק המשפחתי</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #f1f5f9; }
        .amount-text { font-style: italic; letter-spacing: -0.05em; text-align: left; direction: ltr; }
        #admin-panel, #main-content, #history-panel, #loading-screen { display: none; }
        #login-screen { display: flex; }
        .negative { color: #ef4444 !important; }
        input { text-align: center; direction: ltr; }
    </style>
</head>
<body class="min-h-screen">

    <div id="loading-screen" class="fixed inset-0 bg-blue-600 z-[3000] flex flex-col items-center justify-center text-white">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-white mb-4"></div>
        <p class="font-bold italic">מעדכן נתונים מהכספת...</p>
    </div>

    <div id="login-screen" class="fixed inset-0 bg-blue-600 z-[2000] flex flex-col items-center justify-center p-6 text-white">
        <h1 class="text-4xl font-black mb-2 italic">הבנק המשפחתי</h1>
        <p class="text-blue-200 mb-8 font-bold italic">כניסה מאובטחת</p>
        <div class="w-full max-w-sm space-y-4">
            <input type="email" id="login-email" placeholder="אימייל" class="w-full p-4 rounded-2xl text-gray-800 font-bold outline-none shadow-lg">
            <input type="password" id="login-pass" placeholder="סיסמה" class="w-full p-4 rounded-2xl text-gray-800 font-bold outline-none shadow-lg">
            <button onclick="handleLogin()" id="login-btn" class="w-full bg-orange-400 p-4 rounded-2xl font-black text-xl shadow-xl italic">התחברות</button>
            <p id="login-error" class="text-red-300 text-sm font-bold text-center hidden pt-2"></p>
        </div>
    </div>

    <div id="main-content">
        <div class="fixed top-4 right-4 z-50 flex gap-2">
             <button onclick="openAdmin()" class="bg-slate-800 text-white text-[10px] px-4 py-2 rounded-full font-bold shadow-xl border border-slate-600">⚙️ ניהול</button>
        </div>

        <div id="history-panel" class="fixed inset-0 bg-white z-[1500] p-6 overflow-y-auto">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h2 id="history-title" class="text-2xl font-bold text-blue-800 italic">פירוט תנועות</h2>
                <button onclick="closeHistory()" class="bg-gray-100 px-4 py-2 rounded-xl font-bold italic">X</button>
            </div>
            <div id="history-list"></div>
        </div>

        <div id="admin-panel" class="fixed inset-0 bg-white z-[1000] p-6 overflow-y-auto">
            <div class="flex justify-between items-center mb-8 border-b pb-4">
                <h2 class="text-2xl font-bold text-blue-800 italic">ניהול חשבון</h2>
                <button onclick="closeAdmin()" class="bg-gray-100 px-4 py-2 rounded-xl font-bold italic text-right">X</button>
            </div>
            <div class="space-y-6 text-right">
                <p class="font-bold text-gray-500 text-sm">הפקדה לחשבון של שגיא</p>
                <select id="admin-target" class="w-full p-4 border-2 border-gray-200 rounded-2xl bg-white font-bold text-right outline-none">
                    <option value="cash">💵 עו"ש (מזומן)</option>
                    <option value="savings">🏦 פיקדון (חיסכון)</option>
                    <option value="invest">📈 השקעה (מדד)</option>
                    <option value="config_interest">⚙️ עדכון % ריבית פיקדון</option>
                </select>
                <input type="text" id="admin-amount" inputmode="decimal" class="w-full p-5 border-2 border-blue-100 rounded-2xl text-3xl font-black bg-blue-50" placeholder="0.00">
                <div class="grid grid-cols-2 gap-4">
                    <button id="main-action-btn" onclick="executeAction('plus')" class="bg-green-600 text-white p-6 rounded-2xl font-bold shadow-lg text-xl italic">➕ הפקדה</button>
                    <button id="withdraw-btn" onclick="executeAction('minus')" class="bg-red-600 text-white p-6 rounded-2xl font-bold shadow-lg text-xl italic">➖ משיכה</button>
                </div>
                <div class="pt-20 flex flex-col items-center gap-4">
                    <button onclick="firebase.auth().signOut()" class="text-blue-600 font-bold underline">התנתק מהמערכת</button>
                </div>
            </div>
        </div>

        <header class="bg-blue-600 text-white pt-12 pb-10 px-8 rounded-b-[3rem] shadow-xl mb-8 text-center">
            <h1 class="text-3xl font-extrabold italic">הבנק של שגיא</h1>
        </header>

        <main class="px-6 space-y-6 max-w-md mx-auto pb-20">
            <div class="bg-white p-6 rounded-3xl shadow-md border-r-8 border-orange-400">
                <div class="flex justify-between items-center mb-4">
                    <button onclick="showHistory('cash')" class="text-[10px] bg-orange-50 text-orange-600 px-3 py-1 rounded-full font-bold italic">פירוט ←</button>
                    <h3 class="text-gray-400 text-[10px] font-bold uppercase italic">מזומן (עו"ש)</h3>
                </div>
                <p id="cash-display" class="text-4xl font-black text-gray-800 amount-text">₪0</p>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-md border-r-8 border-green-500">
                <div class="flex justify-between items-start mb-1 text-right italic">
                    <button onclick="showHistory('savings')" class="text-[10px] bg-green-50 text-green-700 px-3 py-1 rounded-full font-bold italic">פירוט ←</button>
                    <h3 class="text-gray-400 text-[10px] font-bold uppercase italic">חיסכון נצבר</h3>
                </div>
                <div id="interest-tag" class="text-[10px] text-green-600 font-bold mb-2 italic">--% ריבית</div>
                <p id="savings-display" class="text-4xl font-black text-gray-800 amount-text">₪0</p>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-md border-r-8 border-indigo-600">
                <div class="flex justify-between items-center mb-2">
                     <button onclick="showHistory('invest')" class="text-[10px] bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full font-bold italic">פירוט ←</button>
                     <h3 class="text-gray-400 text-[10px] font-bold uppercase italic">S&P 500</h3>
                </div>
                <p id="invest-display" class="text-4xl font-black text-gray-800 amount-text mb-4">₪0</p>
                <div class="flex justify-between text-[10px] text-gray-400 border-t pt-3 border-dashed italic">
                    <span id="market-status">מעדכן...</span>
                    <span>קרן: ₪<span id="invest-base">0</span></span>
                </div>
            </div>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCdW8ww3e7lQvDI3e0hO8Yn3YvHbtJSf4g",
            authDomain: "familybank-f6585.firebaseapp.com",
            databaseURL: "https://familybank-f6585-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "familybank-f6585",
            storageBucket: "familybank-f6585.firebasestorage.app",
            messagingSenderId: "398823332492",
            appId: "1:398823332492:web:a1a167f0288cf71c4a79a9"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        // שים לב: שינינו את הנתיב כדי שיהיה קל להוסיף עוד ילדים בהמשך
        const dbRoot = firebase.database().ref('users');
        let dbRef = dbRoot.child('שגיא'); 

        let globalData = null;
        let marketPrice = 0;

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('loading-screen').style.display = 'flex';
                startApp();
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('main-content').style.display = 'none';
                document.getElementById('loading-screen').style.display = 'none';
            }
        });

        function handleLogin() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            auth.signInWithEmailAndPassword(email, pass).catch(() => {
                const errEl = document.getElementById('login-error');
                errEl.innerText = "פרטי גישה שגויים";
                errEl.classList.remove('hidden');
            });
        }

        async function fetchMarket() {
            try {
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/%5EGSPC')}`);
                const j = await res.json();
                marketPrice = JSON.parse(j.contents).chart.result[0].meta.regularMarketPrice;
                return marketPrice;
            } catch(e) { return 0; }
        }

        function startApp() {
            dbRef.on('value', async (s) => {
                globalData = s.val() || {};
                if (!marketPrice) await fetchMarket();
                
                // ברגע שיש נתונים, נסיר את מסך הטעינה ונציג את התוכן
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';

                const interest = globalData.config_interest !== undefined ? (globalData.config_interest / 100) : 0.005;
                document.getElementById('interest-tag').innerText = (interest * 100).toFixed(1) + '% ריבית חודשית';

                let cashTotal = 0;
                if (globalData.cash_log) Object.values(globalData.cash_log).forEach(t => cashTotal += t.amount);
                document.getElementById('cash-display').innerText = '₪' + cashTotal.toLocaleString();

                let savingsTotal = 0;
                const now = new Date().getTime();
                if (globalData.savings_log) {
                    Object.values(globalData.savings_log).forEach(t => {
                        const daysPast = (now - t.date) / (1000 * 60 * 60 * 24);
                        const dailyRate = Math.pow(1 + interest, 1/30);
                        savingsTotal += t.amount * Math.pow(dailyRate, daysPast);
                    });
                }
                document.getElementById('savings-display').innerText = '₪' + Math.round(savingsTotal).toLocaleString();

                let totalUnits = 0, totalInvested = 0;
                if (globalData.invest_log) {
                    Object.values(globalData.invest_log).forEach(t => {
                        totalUnits += t.units;
                        totalInvested += t.amount;
                    });
                }
                document.getElementById('invest-display').innerText = '₪' + Math.round(totalUnits * marketPrice).toLocaleString();
                document.getElementById('invest-base').innerText = totalInvested.toLocaleString();
                document.getElementById('market-status').innerText = "S&P 500: " + Math.round(marketPrice);
            });
        }

        function showHistory(type) {
            const list = document.getElementById('history-list');
            list.innerHTML = "";
            document.getElementById('history-panel').style.display = 'block';
            if (!globalData || !globalData[type + '_log']) return;
            
            Object.values(globalData[type + '_log']).sort((a,b) => b.date - a.date).forEach(t => {
                const row = document.createElement('div');
                row.className = "flex justify-between p-4 border-b italic";
                row.innerHTML = `<span>₪${t.amount.toLocaleString()}</span><span>${new Date(t.date).toLocaleDateString('he-IL')}</span>`;
                list.appendChild(row);
            });
        }

        function closeHistory() { document.getElementById('history-panel').style.display = 'none'; }
        function openAdmin() { if(prompt("סיסמה:") === "1234") document.getElementById('admin-panel').style.display='block'; }
        function closeAdmin() { document.getElementById('admin-panel').style.display='none'; }

        async function executeAction(type) {
            const target = document.getElementById('admin-target').value;
            let val = parseFloat(document.getElementById('admin-amount').value);
            if(isNaN(val) || val === 0) return;
            const now = new Date().getTime();

            if (target === 'config_interest') {
                dbRef.child('config_interest').set(val);
            } else if (target === 'invest') {
                if (type === 'minus') val = -Math.abs(val);
                const units = val / marketPrice;
                dbRef.child('invest_log').push({ amount: val, units, date: now });
            } else {
                if (type === 'minus') val = -Math.abs(val);
                dbRef.child(target + '_log').push({ amount: val, date: now });
            }
            document.getElementById('admin-amount').value = "";
            closeAdmin();
        }
    </script>
</body>
</html>
