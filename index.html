<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הבנק של שגיא - גרסת הטרנזקציות</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #f1f5f9; text-align: right; }
        .amount-text { font-style: italic; letter-spacing: -0.05em; text-align: left; direction: ltr; }
        #admin-panel { display: none; position: fixed; inset: 0; background: white; z-index: 1000; padding: 2rem; overflow-y: auto; }
        .negative { color: #ef4444; }
    </style>
</head>
<body>

    <button onclick="openAdmin()" class="fixed top-4 right-4 z-50 bg-slate-800 text-white text-[10px] px-3 py-2 rounded-full font-bold shadow-xl">⚙️ ניהול</button>

    <div id="admin-panel">
        <div class="flex justify-between items-center mb-6 border-b pb-4">
            <h2 class="text-2xl font-bold text-blue-800">ניהול טרנזקציות</h2>
            <button onclick="closeAdmin()" class="bg-gray-100 px-4 py-2 rounded-xl">X</button>
        </div>
        
        <div class="space-y-4">
            <select id="admin-target" class="w-full p-4 border rounded-2xl bg-gray-50 font-bold">
                <option value="cash">עו"ש (מזומן)</option>
                <option value="savings">פיקדון בריבית</option>
                <option value="invest">השקעה במדד</option>
            </select>
            <input type="number" id="admin-amount" class="w-full p-4 border rounded-2xl text-2xl font-bold" placeholder="סכום (למשל 100 או 50-)">
            
            <div class="grid grid-cols-1 gap-3">
                <button onclick="executeTransaction()" class="bg-blue-600 text-white p-5 rounded-2xl font-bold shadow-lg">בצע פעולה (הפקדה/משיכה)</button>
                <div class="pt-10 border-t mt-10 text-center">
                    <button onclick="resetAccount()" class="bg-red-50 text-red-600 p-3 rounded-xl text-sm font-bold border border-red-200 w-full">⚠️ איפוס חשבון כללי (למחיקת בדיקות)</button>
                </div>
            </div>
        </div>
    </div>

    <header class="bg-blue-600 text-white pt-12 pb-10 px-8 rounded-b-[3rem] shadow-xl mb-8 text-center">
        <h1 class="text-3xl font-extrabold italic">הבנק של שגיא</h1>
        <div id="status-msg" class="text-blue-200 text-[10px] mt-2 italic opacity-70 italic">מערכת טרנזקציות פעילה</div>
    </header>

    <main class="px-6 space-y-6 max-w-md mx-auto">
        <div class="bg-white p-6 rounded-3xl shadow-md border-r-8 border-orange-400 flex justify-between items-center">
            <div class="text-2xl italic">💵</div>
            <div class="text-left">
                <h3 class="text-gray-400 text-[10px] font-bold uppercase mb-1">עו"ש</h3>
                <p id="cash-display" class="text-4xl font-black text-gray-800 amount-text">₪0</p>
            </div>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-md border-r-8 border-green-500">
            <div class="flex justify-between items-start mb-1 text-right">
                <span id="interest-tag" class="bg-green-100 text-green-700 text-[10px] px-2 py-0.5 rounded-full font-bold italic">1.5% ריבית</span>
                <h3 class="text-gray-400 text-[10px] font-bold uppercase italic">פיקדון בריבית</h3>
            </div>
            <p id="savings-display" class="text-4xl font-black text-gray-800 amount-text">₪0</p>
            <div class="text-[10px] text-gray-400 mt-2 border-t pt-2 border-dashed">כולל ריבית שנצברה</div>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-md border-r-8 border-indigo-600">
            <div class="flex justify-between items-center mb-2 text-right">
                 <div id="stock-trend" class="text-[10px] font-bold px-2 py-0.5 rounded-full bg-gray-100 italic">--%</div>
                 <h3 class="text-gray-400 text-[10px] font-bold uppercase italic italic">S&P 500</h3>
            </div>
            <p id="invest-display" class="text-4xl font-black text-gray-800 amount-text mb-4">₪0</p>
            <div class="flex justify-between text-[10px] text-gray-400 border-t pt-3 border-dashed">
                <span id="market-status">מעדכן בורסה...</span>
                <span>קרן: ₪<span id="invest-base">0</span></span>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCdW8ww3e7lQvDI3e0hO8Yn3YvHbtJSf4g",
            authDomain: "familybank-f6585.firebaseapp.com",
            databaseURL: "https://familybank-f6585-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "familybank-f6585",
            storageBucket: "familybank-f6585.firebasestorage.app",
            messagingSenderId: "398823332492",
            appId: "1:398823332492:web:a1a167f0288cf71c4a79a9",
            measurementId: "G-YZD85S2B6V"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('users/שגיא');
        
        let marketPrice = 0;
        const MONTHLY_INTEREST = 0.015; // 1.5% ריבית לחודש

        async function fetchMarket() {
            try {
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/%5EGSPC')}`);
                const j = await res.json();
                marketPrice = JSON.parse(j.contents).chart.result[0].meta.regularMarketPrice;
                document.getElementById('market-status').innerText = "מדד: " + Math.round(marketPrice);
                return marketPrice;
            } catch(e) { return 0; }
        }

        db.on('value', async (s) => {
            const data = s.val() || {};
            await fetchMarket();
            
            // חישוב עו"ש
            let cashTotal = 0;
            if (data.cash_log) {
                Object.values(data.cash_log).forEach(t => cashTotal += t.amount);
            }
            const cashEl = document.getElementById('cash-display');
            cashEl.innerText = '₪' + cashTotal.toLocaleString();
            cashEl.className = cashTotal < 0 ? "text-4xl font-black amount-text negative" : "text-4xl font-black amount-text text-gray-800";

            // חישוב חיסכון עם ריבית דריבית יומית
            let savingsTotal = 0;
            if (data.savings_log) {
                const now = new Date().getTime();
                Object.values(data.savings_log).forEach(t => {
                    const daysPast = (now - t.date) / (1000 * 60 * 60 * 24);
                    // חישוב ריבית יומית מצטברת
                    const dailyRate = Math.pow(1 + MONTHLY_INTEREST, 1/30);
                    savingsTotal += t.amount * Math.pow(dailyRate, daysPast);
                });
            }
            document.getElementById('savings-display').innerText = '₪' + Math.round(savingsTotal).toLocaleString();

            // חישוב השקעות (יחידות)
            let totalUnits = 0;
            let totalInvested = 0;
            if (data.invest_log) {
                Object.values(data.invest_log).forEach(t => {
                    totalUnits += t.units;
                    totalInvested += t.amount;
                });
            }
            const currentInvestValue = Math.round(totalUnits * marketPrice);
            document.getElementById('invest-display').innerText = '₪' + currentInvestValue.toLocaleString();
            document.getElementById('invest-base').innerText = totalInvested.toLocaleString();
            
            const diff = totalInvested > 0 ? (((currentInvestValue - totalInvested) / totalInvested) * 100).toFixed(2) : 0;
            const trend = document.getElementById('stock-trend');
            trend.innerText = (diff >= 0 ? '+' : '') + diff + '%';
            trend.className = diff >= 0 ? "text-[10px] font-bold px-2 py-0.5 rounded-full bg-green-100 text-green-700 italic" : "text-[10px] font-bold px-2 py-0.5 rounded-full bg-red-100 text-red-700 italic";
        });

        function openAdmin() { if(prompt("סיסמה:") === "1234") document.getElementById('admin-panel').style.display='block'; }
        function closeAdmin() { document.getElementById('admin-panel').style.display='none'; }

        async function executeTransaction() {
            const target = document.getElementById('admin-target').value;
            const amount = parseFloat(document.getElementById('admin-amount').value);
            if(isNaN(amount)) return;

            const now = new Date().getTime();

            if (target === 'invest') {
                if (marketPrice === 0) await fetchMarket();
                const units = amount / marketPrice;
                db.child('invest_log').push({ amount, units, date: now });
            } else {
                db.child(target + '_log').push({ amount, date: now });
            }
            
            alert("הפעולה בוצעה!");
            document.getElementById('admin-amount').value = "";
            closeAdmin();
        }

        function resetAccount() {
            if (confirm("האם אתה בטוח שברצונך למחוק את כל היסטוריית הפעולות ולאפס את החשבון?")) {
                db.set({ initialized: true }).then(() => {
                    alert("החשבון אופס.");
                    location.reload();
                });
            }
        }
    </script>
</body>
</html>
