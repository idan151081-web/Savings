<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הבנק של שגיא</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; transition: background-color 0.5s; }
        .card-pop { animation: pop 0.5s ease-out; }
        @keyframes pop { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-10">

    <header class="bg-gradient-to-r from-blue-600 to-blue-800 text-white p-8 rounded-b-[3rem] shadow-2xl mb-8 text-center">
        <h1 class="text-3xl font-extrabold tracking-tight">הבנק של שגיא</h1>
        <div id="last-sync" class="text-blue-200 text-xs mt-2 font-mono italic text-left">מעדכן נתונים...</div>
    </header>

    <main class="px-6 space-y-6 max-w-md mx-auto">
        
        <div class="card-pop bg-white p-6 rounded-3xl shadow-sm border-r-8 border-orange-400 flex justify-between items-center">
            <div>
                <h3 class="text-gray-400 text-xs font-bold uppercase">עו"ש (מזומן)</h3>
                <p id="cash-display" class="text-4xl font-black text-gray-800 tracking-tighter">₪--</p>
            </div>
            <div class="bg-orange-50 p-3 rounded-2xl text-2xl">💵</div>
        </div>

        <div class="card-pop bg-white p-6 rounded-3xl shadow-sm border-r-8 border-green-500 overflow-hidden relative">
            <div>
                <h3 class="text-gray-400 text-xs font-bold uppercase">פיקדון בריבית</h3>
                <p id="savings-display" class="text-4xl font-black text-gray-800 tracking-tighter">₪--</p>
                <div class="mt-2 flex items-center gap-2">
                    <span id="interest-tag" class="bg-green-100 text-green-700 text-[10px] px-2 py-0.5 rounded-full font-bold">0% ריבית</span>
                </div>
            </div>
            <div class="absolute left-6 top-1/2 -translate-y-1/2 text-2xl opacity-40 italic font-serif">%</div>
        </div>

        <div id="invest-card" class="card-pop bg-white p-6 rounded-3xl shadow-sm border-r-8 border-indigo-600">
            <div class="flex justify-between items-start">
                <div>
                    <h3 class="text-gray-400 text-xs font-bold uppercase italic">מסלול מדד (S&P 500)</h3>
                    <p id="invest-display" class="text-4xl font-black text-gray-800 tracking-tighter">₪--</p>
                </div>
                <div id="stock-trend" class="text-xs font-bold px-2 py-1 rounded-lg">--</div>
            </div>
            <div class="mt-3 flex justify-between items-center text-[11px] text-gray-400 border-t pt-3 border-dashed">
                <span>קרן: <span id="invest-base">₪0</span></span>
                <span id="market-status" class="italic">טוען שער בורסה...</span>
            </div>
        </div>

    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCdW8ww3e7lQvDI3e0hO8Yn3YvHbtJSf4g",
            authDomain: "familybank-f6585.firebaseapp.com",
            databaseURL: "https://familybank-f6585-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "familybank-f6585",
            storageBucket: "familybank-f6585.firebasestorage.app",
            messagingSenderId: "398823332492",
            appId: "1:398823332492:web:a1a167f0288cf71c4a79a9",
            measurementId: "G-YZD85S2B6V"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const childRef = database.ref('users/שגיא');

        // פונקציה למשיכת שער המדד (S&P 500) בזמן אמת
        async function getMarketData() {
            try {
                // שימוש ב-API פתוח לקבלת שער ה-GSPC (סימול המדד)
                const response = await fetch('https://query1.finance.yahoo.com/v8/finance/chart/%5EGSPC');
                const data = await response.json();
                return data.chart.result[0].meta.regularMarketPrice;
            } catch (e) {
                console.error("שגיאה במשיכת נתוני בורסה", e);
                return null;
            }
        }

        childRef.on('value', async (snapshot) => {
            const val = snapshot.val();
            if (!val) return;

            // עדכון מזומן וחיסכון
            document.getElementById('cash-display').innerText = '₪' + (val.Cash || 0).toLocaleString();
            document.getElementById('savings-display').innerText = '₪' + (val.Savings || 0).toLocaleString();
            document.getElementById('interest-tag').innerText = (val.Interest_ratr || 0) + '% ריבית חודשית';
            
            // חישוב השקעות במדד
            const marketPrice = await getMarketData();
            if (marketPrice && val.Investments && val.Investments_Base) {
                const ratio = marketPrice / val.Investments_Base;
                const currentValue = Math.round(val.Investments * ratio);
                const profitPercent = (((marketPrice - val.Investments_Base) / val.Investments_Base) * 100).toFixed(2);
                
                document.getElementById('invest-display').innerText = '₪' + currentValue.toLocaleString();
                document.getElementById('invest-base').innerText = '₪' + val.Investments.toLocaleString();
                
                const trendEl = document.getElementById('stock-trend');
                if (profitPercent >= 0) {
                    trendEl.innerText = '+' + profitPercent + '%';
                    trendEl.className = 'text-xs font-bold px-2 py-1 rounded-lg bg-green-100 text-green-700';
                    document.getElementById('invest-card').classList.add('border-green-600');
                } else {
                    trendEl.innerText = profitPercent + '%';
                    trendEl.className = 'text-xs font-bold px-2 py-1 rounded-lg bg-red-100 text-red-700';
                }
                document.getElementById('market-status').innerText = 'שער מדד: ' + Math.round(marketPrice);
            }

            document.getElementById('last-sync').innerText = 'סונכרן לאחרונה: ' + new Date().toLocaleTimeString();
        });
    </script>
</body>
</html>
