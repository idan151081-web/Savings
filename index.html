<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הבנק של שגיא</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #f1f5f9; text-align: right; }
        .amount-text { font-style: italic; letter-spacing: -0.05em; text-align: left; direction: ltr; }
        #admin-panel { display: none; position: fixed; inset: 0; background: white; z-index: 100; padding: 2rem; overflow-y: auto; }
        select, input { text-align: right; direction: rtl; }
    </style>
</head>
<body>

    <div id="admin-panel">
        <div class="flex justify-between items-center mb-6 border-b pb-4">
            <h2 class="text-2xl font-bold text-blue-800">מסך ניהול הורה</h2>
            <button onclick="closeAdmin()" class="bg-red-50 text-red-600 px-4 py-2 rounded-lg font-bold">ביטול X</button>
        </div>
        
        <div class="space-y-6">
            <div>
                <label class="block font-bold text-gray-700 mb-2">לאיזה חשבון לעדכן?</label>
                <select id="admin-target" class="w-full p-4 border-2 border-gray-100 rounded-2xl bg-gray-50 focus:border-blue-500 outline-none">
                    <option value="Cash">עו"ש (מזומן)</option>
                    <option value="Savings">פיקדון בריבית</option>
                    <option value="Interest_ratr">אחוז ריבית חודשית</option>
                    <option value="Investments">השקעה במדד (קרן)</option>
                    <option value="Investments_Base">שער קנייה (Base)</option>
                </select>
            </div>

            <div>
                <label class="block font-bold text-gray-700 mb-2">סכום / ערך:</label>
                <input type="number" id="admin-amount" class="w-full p-4 border-2 border-gray-100 rounded-2xl bg-gray-50 focus:border-blue-500 outline-none text-2xl font-bold" placeholder="0">
            </div>

            <div class="grid grid-cols-2 gap-4 pt-4">
                <button onclick="updateData('add')" class="bg-green-600 text-white p-5 rounded-2xl font-bold shadow-lg active:scale-95 transition-transform text-lg">➕ הוסף</button>
                <button onclick="updateData('set')" class="bg-blue-600 text-white p-5 rounded-2xl font-bold shadow-lg active:scale-95 transition-transform text-lg">📝 קבע חדש</button>
            </div>
            
            <p class="text-sm text-gray-400 text-center italic mt-4">"הוסף" מוסיף לקיים | "קבע" מחליף את המספר לגמרי</p>
        </div>
    </div>

    <header class="bg-blue-600 text-white p-8 rounded-b-[3rem] shadow-xl mb-8 relative">
        <button onclick="openAdmin()" class="absolute top-6 left-6 bg-blue-500/50 hover:bg-blue-400 border border-white/30 text-white text-xs px-3 py-1.5 rounded-full font-bold backdrop-blur-sm transition-all">
            ⚙️ ניהול הורה
        </button>
        
        <div class="text-center mt-4">
            <h1 class="text-3xl font-extrabold tracking-tight">הבנק של שגיא</h1>
            <div id="status-msg" class="text-blue-200 text-[10px] mt-2 italic opacity-80">מחובר למערכת</div>
        </div>
    </header>

    <main class="px-6 space-y-6 max-w-md mx-auto">
        <div class="bg-white p-6 rounded-3xl shadow-md border-r-8 border-orange-400 flex justify-between items-center">
            <div class="bg-orange-50 p-3 rounded-2xl text-2xl">💵</div>
            <div class="text-left">
                <h3 class="text-gray-400 text-[10px] font-bold uppercase mb-1">עו"ש (מזומן)</h3>
                <p class="text-4xl font-black text-gray-800 amount-text">₪<span id="cash-display">--</span></p>
            </div>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-md border-r-8 border-green-500 flex justify-between items-center">
            <div class="text-left w-full">
                <div class="flex justify-between items-start mb-1 text-right">
                    <span id="interest-tag" class="bg-green-100 text-green-700 text-[10px] px-2 py-0.5 rounded-full font-bold italic">--% ריבית</span>
                    <h3 class="text-gray-400 text-[10px] font-bold uppercase">פיקדון בריבית</h3>
                </div>
                <p class="text-4xl font-black text-gray-800 amount-text">₪<span id="savings-display">--</span></p>
            </div>
        </div>

        <div id="invest-card" class="bg-white p-6 rounded-3xl shadow-md border-r-8 border-indigo-600">
            <div class="flex justify-between items-start mb-1 text-right">
                 <div id="stock-trend" class="text-[10px] font-bold px-2 py-0.5 rounded-full bg-gray-100 text-gray-500 italic italic">טוען...</div>
                 <h3 class="text-gray-400 text-[10px] font-bold uppercase">מסלול מדד (S&P 500)</h3>
            </div>
            <p class="text-4xl font-black text-gray-800 amount-text mb-4 text-left">₪<span id="invest-display">--</span></p>
            <div class="flex justify-between items-center text-[10px] text-gray-400 border-t pt-3 border-dashed">
                <span id="market-status" class="italic italic">מעדכן מהבורסה...</span>
                <span>השקעה: ₪<span id="invest-base">0</span></span>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCdW8ww3e7lQvDI3e0hO8Yn3YvHbtJSf4g",
            authDomain: "familybank-f6585.firebaseapp.com",
            databaseURL: "https://familybank-f6585-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "familybank-f6585",
            storageBucket: "familybank-f6585.firebasestorage.app",
            messagingSenderId: "398823332492",
            appId: "1:398823332492:web:a1a167f0288cf71c4a79a9",
            measurementId: "G-YZD85S2B6V"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('users/שגיא');
        let currentData = {};

        // האזנה לנתונים
        db.on('value', async (s) => {
            currentData = s.val();
            if (!currentData) return;
            document.getElementById('cash-display').innerText = (currentData.Cash || 0).toLocaleString();
            document.getElementById('savings-display').innerText = (currentData.Savings || 0).toLocaleString();
            document.getElementById('interest-tag').innerText = (currentData.Interest_ratr || 0) + '% ריבית';
            document.getElementById('invest-base').innerText = (currentData.Investments || 0).toLocaleString();
            
            // עדכון בורסה
            try {
                const url = `https://query1.finance.yahoo.com/v8/finance/chart/%5EGSPC`;
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
                const response = await fetch(proxyUrl);
                const j = await response.json();
                const m = JSON.parse(j.contents).chart.result[0].meta.regularMarketPrice;
                const calc = Math.round(currentData.Investments * (m / (currentData.Investments_Base || 5000)));
                const diff = (((m - currentData.Investments_Base) / currentData.Investments_Base) * 100).toFixed(2);
                
                document.getElementById('invest-display').innerText = calc.toLocaleString();
                const tr = document.getElementById('stock-trend');
                tr.innerText = (diff > 0 ? '+' : '') + diff + '%';
                tr.className = diff > 0 ? "text-[10px] font-bold px-2 py-0.5 rounded-full bg-green-100 text-green-700 italic" : "text-[10px] font-bold px-2 py-0.5 rounded-full bg-red-100 text-red-700 italic";
                document.getElementById('market-status').innerText = "מדד: " + Math.round(m);
            } catch(e) { document.getElementById('invest-display').innerText = (currentData.Investments || 0).toLocaleString(); }
        });

        // פונקציות ניהול
        function openAdmin() {
            if (prompt("הכנס קוד סודי לניהול:") === "1234") {
                document.getElementById('admin-panel').style.display = 'block';
            } else { alert("קוד שגוי!"); }
        }

        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

        function updateData(mode) {
            const field = document.getElementById('admin-target').value;
            const amount = parseFloat(document.getElementById('admin-amount').value);
            if (isNaN(amount)) return alert("הכנס מספר תקין");

            const finalValue = mode === 'add' ? (currentData[field] || 0) + amount : amount;

            db.child(field).set(finalValue).then(() => {
                alert("עודכן בהצלחה!");
                document.getElementById('admin-amount').value = "";
                closeAdmin();
            });
        }
    </script>
</body>
</html>
