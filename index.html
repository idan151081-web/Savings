<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הבנק של שגיא</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <header class="bg-blue-600 text-white p-8 rounded-b-3xl shadow-lg mb-8 text-center">
        <h1 class="text-3xl font-bold">הבנק של שגיא</h1>
        <p class="text-blue-100 mt-2">החשבון האישי שלי</p>
    </header>

    <main class="px-6 space-y-6">
        
        <div class="bg-white p-6 rounded-2xl shadow-md border-r-8 border-orange-400">
            <h3 class="text-gray-500 text-sm font-bold uppercase tracking-wide">קופת מזומן (נזיל)</h3>
            <div class="flex justify-between items-end mt-2">
                <p id="cash-display" class="text-4xl font-black text-gray-800">₪--</p>
                <span class="text-2xl">💰</span>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-md border-r-8 border-green-500">
            <h3 class="text-gray-500 text-sm font-bold uppercase tracking-wide">חיסכון צובר ריבית</h3>
            <div class="flex justify-between items-end mt-2">
                <p id="savings-display" class="text-4xl font-black text-gray-800">₪--</p>
                <span class="text-2xl">📈</span>
            </div>
            <div class="mt-4 pt-4 border-t border-gray-100 flex justify-between">
                <span id="interest-display" class="text-green-600 font-bold text-sm italic">טוען ריבית...</span>
            </div>
        </div>

    </main>

    <script>
        // ה-Config האישי שלך
        const firebaseConfig = {
            apiKey: "AIzaSyCdW8ww3e7lQvDI3e0hO8Yn3YvHbtJSf4g",
            authDomain: "familybank-f6585.firebaseapp.com",
            databaseURL: "https://familybank-f6585-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "familybank-f6585",
            storageBucket: "familybank-f6585.firebasestorage.app",
            messagingSenderId: "398823332492",
            appId: "1:398823332492:web:a1a167f0288cf71c4a79a9",
            measurementId: "G-YZD85S2B6V"
        };

        // אתחול המערכת
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // התחברות לנתונים של שגיא (שים לב שהשם תואם בדיוק למה שכתבת ב-Firebase)
        const childRef = database.ref('users/שגיא');

        // האזנה לשינויים בזמן אמת
        childRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                // עדכון הסכומים על המסך
                document.getElementById('cash-display').innerText = '₪' + (data.Cash || 0);
                document.getElementById('savings-display').innerText = '₪' + (data.Savings || 0);
                document.getElementById('interest-display').innerText = 'ריבית חודשית: ' + (data.Interest_ratr || 0) + '%';
            } else {
                console.log("לא נמצאו נתונים עבור שגיא");
            }
        }, (error) => {
            console.error("שגיאה במשיכת נתונים:", error);
        });
    </script>
</body>
</html>
